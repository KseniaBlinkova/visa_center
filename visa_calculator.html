<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Калькулятор</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="lab-purpose">
    <p>Цель лабораторной работы: <span class="highlight">знакомство</span> 
      с инструментами построения пользовательских интерфейсов 
      web-сайтов: <span class="highlight">HTML</span> и <span class="highlight">CSS</span>.</p>
  </div>
  
  <div class = "change-theme">
    <button id = "theme-toggle" class = "theme-btn">Сменить тему</button>
  </div>

  <div class="visa-container"> 
      <div id="visa-display" class="display">0</div>

      <div class="keypad">
          <div class="row">  
              <button id="op_clear" class="btn secondary">C</button>   
              <button id="op_revoke" class="btn secondary">+/-</button>
              <button id="op_rate" class="btn secondary">%</button>
              <button id="op_distribute" class="btn primary">/</button>
          </div>
          <div class="row">
              <button id="digit_7" class="btn">7</button>
              <button id="digit_8" class="btn">8</button>
              <button id="digit_9" class="btn">9</button>
              <button id="op_issue" class="btn primary">x</button>
          </div>
          <div class="row">
              <button id="digit_4" class="btn">4</button>
              <button id="digit_5" class="btn">5</button>
              <button id="digit_6" class="btn">6</button>
              <button id="op_deny" class="btn primary">-</button>
          </div>
          <div class="row">
              <button id="digit_1" class="btn">1</button>
              <button id="digit_2" class="btn">2</button>
              <button id="digit_3" class="btn">3</button>
              <button id="op_submit" class="btn primary">+</button>
          </div>
          <div class="row">
              <button id="digit_0" class="btn">0</button>
              <button id="op_dot" class="btn">.</button>
              <button id="op_budget" class="btn author">БЮДЖЕТ</button>
          </div>

          <div class="row">
            <button id="op_report" class="btn primary execute">=</button>
          </div>
      </div>
  </div>


  <div class="author-information">
      <details class="author-details">
        <summary>Автор</summary>
          <p>ФИО: Блинкова Ксения</p>
          <p>Группа: ИУ5-41Б</p>
          <p>Лабораторная работа №1</p>
      </details>
  </div>
  
  <div class = "github-btn-container">
    <a href="https://github.com/KseniaBlinkova/Blinkova-PNA-Labs-2026.git" target="_blank" class="github-btn">МОЙ GitHub</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
